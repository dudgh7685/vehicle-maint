<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부대 차량 정비 통합 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { gray: { 850: '#1f2937', 900: '#111827' } } } }
        }
    </script>
    <style>
        body { background-color: #111827; color: #f3f4f6; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day { min-height: 100px; padding: 4px; background: #1f2937; border-radius: 6px; }
        .cal-day.other-month { opacity: 0.3; }
        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-10">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-xl font-bold text-blue-400"><i class="fas fa-truck-wrench mr-2"></i>차량 정비 관리 시스템</h1>
            <nav class="flex gap-2 bg-gray-900 p-1 rounded-lg">
                <button onclick="switchTab('dashboard')" class="tab-btn px-4 py-2 rounded-md bg-blue-600 text-white font-semibold transition"><i class="fas fa-calendar-alt mr-1"></i> 대시보드</button>
                <button onclick="switchTab('breakdown')" class="tab-btn px-4 py-2 rounded-md hover:bg-gray-700 transition"><i class="fas fa-tools mr-1"></i> 고장 접수</button>
                <button onclick="switchTab('settings')" class="tab-btn px-4 py-2 rounded-md hover:bg-gray-700 transition"><i class="fas fa-cog mr-1"></i> 설정/데이터</button>
            </nav>
        </div>
    </header>

    <main class="flex-grow p-4 max-w-6xl mx-auto w-full">
        
        <section id="dashboard" class="tab-content active space-y-6">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 bg-gray-800 p-4 rounded-xl border border-gray-700">
                <div class="flex items-center gap-4">
                    <button onclick="changeMonth(-1)" class="p-2 hover:bg-gray-700 rounded"><i class="fas fa-chevron-left"></i></button>
                    <h2 id="current-month-display" class="text-2xl font-bold">2026년 8월</h2>
                    <button onclick="changeMonth(1)" class="p-2 hover:bg-gray-700 rounded"><i class="fas fa-chevron-right"></i></button>
                </div>
                <div class="flex gap-2">
                    <button onclick="generateReport('today')" class="bg-indigo-600 hover:bg-indigo-700 px-3 py-2 rounded-lg text-sm transition"><i class="fas fa-copy mr-1"></i> 오늘/내일 복사</button>
                    <button onclick="generateReport('month')" class="bg-purple-600 hover:bg-purple-700 px-3 py-2 rounded-lg text-sm transition"><i class="fas fa-copy mr-1"></i> 월간 보고서 복사</button>
                </div>
            </div>

            <div id="report-area" class="hidden bg-gray-800 p-4 rounded-xl border border-gray-700">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="font-bold text-indigo-400">생성된 보고서 텍스트</h3>
                    <button onclick="copyReportText()" class="text-sm bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded">클립보드 복사</button>
                </div>
                <textarea id="report-output" class="w-full bg-gray-900 border border-gray-700 rounded p-3 h-32 text-sm text-gray-300" readonly></textarea>
            </div>

            <div class="bg-gray-800 rounded-xl border border-gray-700 p-4">
                <div class="grid grid-cols-7 gap-4 mb-2 text-center font-bold text-gray-400 text-sm">
                    <div class="text-red-400">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="text-blue-400">토</div>
                </div>
                <div id="calendar-grid" class="calendar-grid"></div>
            </div>

            <div class="flex flex-wrap gap-4 justify-center text-sm">
                <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-red-600"></span> 고장 정비</span>
                <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-blue-600"></span> 반기(정기점검)</span>
                <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-yellow-500"></span> 월간(일일점검)</span>
                <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-green-500"></span> 일일 정비(자동할당)</span>
            </div>
        </section>

        <section id="breakdown" class="tab-content space-y-6">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 max-w-2xl mx-auto">
                <h2 class="text-xl font-bold mb-4 border-b border-gray-700 pb-2"><i class="fas fa-exclamation-triangle text-red-500 mr-2"></i> 고장 정비 접수</h2>
                <form id="breakdown-form" class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">대상 차량 (호수)</label>
                        <select id="bd-vehicle" required class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white"></select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">정비개소 (대분류)</label>
                        <select id="bd-cat-main" onchange="updateSubCategory()" required class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white">
                            <option value="">대분류 선택</option>
                            <option value="엔진 장치">엔진 장치</option>
                            <option value="섀시 장치">섀시 장치</option>
                            <option value="전기/편의">전기/편의</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">정비개소 (소분류)</label>
                        <select id="bd-cat-sub" onchange="checkCustomInput()" required class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white disabled:opacity-50" disabled>
                            <option value="">대분류를 먼저 선택하세요</option>
                        </select>
                    </div>
                    <div id="custom-input-container" class="hidden">
                        <label class="block text-sm text-gray-400 mb-1">기타 (직접 입력)</label>
                        <input type="text" id="bd-custom" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white" placeholder="상세 부위를 입력하세요">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">고장 내용 및 증상</label>
                        <textarea id="bd-desc" required class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white h-24"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-lg transition">접수 및 달력 등록</button>
                </form>
            </div>
        </section>

        <section id="settings" class="tab-content space-y-6">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 max-w-2xl mx-auto">
                <h2 class="text-xl font-bold mb-4 border-b border-gray-700 pb-2"><i class="fas fa-database text-green-500 mr-2"></i> 데이터 연동 (Excel)</h2>
                
                <div class="mb-6 bg-gray-900 p-4 rounded-lg border border-gray-600">
                    <p class="text-sm text-gray-400 mb-2">업로드 규칙: [차량대장], [체크리스트 DB], [예방정비계획] 3개 시트 필수 포함.</p>
                    <input type="file" id="excel-upload" accept=".xlsx, .xls" class="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700">
                </div>

                <div class="grid grid-cols-2 gap-4 text-center">
                    <div class="bg-gray-900 p-4 rounded border border-gray-700">
                        <div class="text-gray-400 text-sm">등록된 차량</div>
                        <div id="stat-vehicles" class="text-2xl font-bold text-white">0</div>
                    </div>
                    <div class="bg-gray-900 p-4 rounded border border-gray-700">
                        <div class="text-gray-400 text-sm">예방정비 계획</div>
                        <div id="stat-plans" class="text-2xl font-bold text-white">0</div>
                    </div>
                </div>

                <div class="mt-8 border-t border-gray-700 pt-4">
                    <button onclick="resetData()" class="w-full bg-red-900 hover:bg-red-800 text-red-200 py-2 rounded transition text-sm">시스템 전체 초기화 (데이터 삭제)</button>
                </div>
            </div>
        </section>

    </main>

    <script>
        // --- State Management ---
        let state = {
            vehicles: JSON.parse(localStorage.getItem('sys_vehicles') || '[]'),
            checklist: JSON.parse(localStorage.getItem('sys_checklist') || '[]'),
            plans: JSON.parse(localStorage.getItem('sys_plans') || '[]'),
            breakdowns: JSON.parse(localStorage.getItem('sys_breakdowns') || '[]'),
            schedule: {}, // Generated memory schedule
            currentDate: new Date()
        };

        const subCats = {
            "엔진 장치": ["윤활계통", "냉각계통", "연료계통", "흡·배기계통", "구동벨트류", "기타"],
            "섀시 장치": ["조향계통", "제동계통", "현가계통", "동력전달", "타이어 및 휠", "기타"],
            "전기/편의": ["시동 및 충전계통", "등화장치", "공조/편의장치", "기타"]
        };

        // --- Init ---
        function init() {
            updateStats();
            populateVehicleSelect();
            generateSchedule();
            renderCalendar();
        }

        // --- UI Navigation ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('bg-blue-600', 'text-white');
                el.classList.add('hover:bg-gray-700');
            });
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.remove('hover:bg-gray-700');
            event.currentTarget.classList.add('bg-blue-600', 'text-white');
            
            if(tabId === 'dashboard') { generateSchedule(); renderCalendar(); }
        }

        // --- Data Mapping & Filtering ---
        function mapGroup(name) {
            if(/1톤|2\.5톤|5톤|마이티|봉고/.test(name)) return "상용트럭";
            if(/K311|1 1\/4톤/.test(name)) return "K311 계열";
            if(/K711/.test(name)) return "K711 계열";
            if(/덤프|트랙터|유조차\(8\.5~25톤\)|대형/.test(name)) return "대형트럭(덤프/트랙터)";
            if(/유조형|급수차/.test(name)) return "유조차(특장)";
            if(/스타렉스|12인승|AMB|중형버스/.test(name)) return "승합차";
            if(/코란도|렉스턴|짚/.test(name)) return "소형/승용차";
            if(/리프트/.test(name)) return "리프트 자동차용";
            if(/세척기/.test(name)) return "고압 세척기";
            if(/수거기/.test(name)) return "차량오일 수거기";
            return "기타"; 
        }

        function filterVehicle(id, name) {
            const blacklistIds = ['188-1', '190-1', '191-1', '197'];
            if(blacklistIds.includes(String(id))) return false;
            if(name.includes('30kw') || name.includes('발전기')) return false;
            return true;
        }

        function formatExcelDate(serial) {
            if(!serial) return "";
            if(typeof serial === 'string') return serial.replace(/\//g, '-');
            const utc_days = Math.floor(serial - 25569);
            const date_info = new Date(utc_days * 86400 * 1000);
            return date_info.toISOString().split('T')[0];
        }

        // --- Excel Upload & Parse ---
        document.getElementById('excel-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                
                try {
                    // 1. 차량대장
                    let rawVehicles = XLSX.utils.sheet_to_json(workbook.Sheets['차량대장']);
                    state.vehicles = rawVehicles.filter(v => filterVehicle(v.호수, v.품명)).map(v => ({
                        id: String(v.호수),
                        name: v.품명,
                        group: v.점검그룹 || mapGroup(v.품명)
                    }));

                    // 2. 체크리스트 DB
                    let rawDB = XLSX.utils.sheet_to_json(workbook.Sheets['체크리스트 DB']);
                    state.checklist = rawDB.map(d => ({
                        group: d.점검그룹,
                        cycle: d.점검주기,
                        item: d.항목,
                        method: d.정비방법
                    }));

                    // 3. 예방정비계획
                    let rawPlans = XLSX.utils.sheet_to_json(workbook.Sheets['예방정비계획']);
                    state.plans = rawPlans.map(p => ({
                        id: String(p.호수),
                        date: formatExcelDate(p.계획일자),
                        type: p.점검주기 // 월간, 반기
                    }));

                    saveState();
                    init();
                    alert('데이터 매핑 및 업로드가 완료되었습니다.');
                } catch(err) {
                    alert('엑셀 형식이 맞지 않습니다. 시트명과 열 이름을 확인하세요.');
                    console.error(err);
                }
            };
            reader.readAsArrayBuffer(file);
        });

        // --- Core Scheduling Algorithm ---
        function isHoliday(d) {
            // 주말 체크 (0:일, 6:토)
            const day = d.getDay();
            return (day === 0 || day === 6);
            // 실제 환경에서는 법정 공휴일 배열 체크 로직 추가 가능
        }

        function getNextWorkingDay(dateObj) {
            let d = new Date(dateObj);
            while(isHoliday(d)) {
                d.setDate(d.getDate() + 1);
            }
            return d.toISOString().split('T')[0];
        }

        function generateSchedule() {
            state.schedule = {}; // Reset
            let dMap = {}; // Helper Map

            // Init empty schedule array for current and surrounding months to process
            const year = state.currentDate.getFullYear();
            const month = state.currentDate.getMonth();
            for(let d=1; d<=31; d++) {
                let temp = new Date(year, month, d);
                if(temp.getMonth() === month) {
                    dMap[temp.toISOString().split('T')[0]] = { bg: [], pm: [], pushed: null };
                }
            }

            // 1. 고장정비 (Breakdowns) - 무조건 최우선
            state.breakdowns.forEach(b => {
                let rDate = getNextWorkingDay(new Date(b.date)); // 휴일이면 다음 평일로
                if(!dMap[rDate]) dMap[rDate] = { bg: [], pm: [] };
                dMap[rDate].bg.push(b);
            });

            // 2. 예방정비 (Plans)
            let pushedPlans = []; // 양보해서 밀려난 계획들
            
            state.plans.forEach(p => {
                // 이 달의 계획만 일단 로드 (단순화)
                if(!p.date.startsWith(`${year}-${String(month+1).padStart(2,'0')}`)) return;

                let targetDate = new Date(p.date);
                
                // 휴일이면 앞으로 당김 (앞당겨진 일정)
                let isPulledForward = false;
                while(isHoliday(targetDate)) {
                    targetDate.setDate(targetDate.getDate() - 1);
                    isPulledForward = true;
                }
                
                let sDate = targetDate.toISOString().split('T')[0];
                if(!dMap[sDate]) dMap[sDate] = { bg: [], pm: [] };

                // 충돌 감지 및 양보 로직
                // "앞당겨져서 배치되었는데, 그 날 고장정비가 들어온 경우"
                if(isPulledForward && dMap[sDate].bg.length > 0) {
                    // 양보해서 다른 빈 날짜로 밀려나야 함. (원래 계획일보다는 뒤로 안 됨)
                    pushedPlans.push({plan: p, maxDate: p.date, originalAttempt: sDate});
                } else {
                    dMap[sDate].pm.push(p);
                }
            });

            // 밀려난 일정 재배치
            pushedPlans.forEach(pp => {
                let attempt = new Date(pp.originalAttempt);
                let placed = false;
                // 원래 시도했던 날짜 다음날부터, 원래 맥스 날짜까지 빈 공간 찾기
                attempt.setDate(attempt.getDate() + 1);
                
                while(attempt.toISOString().split('T')[0] <= pp.maxDate) {
                    let sD = attempt.toISOString().split('T')[0];
                    if(!isHoliday(attempt)) {
                        if(!dMap[sD]) dMap[sD] = { bg: [], pm: [] };
                        if(dMap[sD].bg.length === 0 && dMap[sD].pm.length === 0) {
                            dMap[sD].pm.push(pp.plan);
                            placed = true;
                            break;
                        }
                    }
                    attempt.setDate(attempt.getDate() + 1);
                }
                
                // 자리 못 찾았으면 그냥 원래 당겨진 날에 합류
                if(!placed) {
                    dMap[pp.originalAttempt].pm.push(pp.plan);
                }
            });

            // 3. 빈 날짜 자동 할당 (Green)
            // state.vehicles에서 랜덤 선택.
            if(state.vehicles.length > 0) {
                Object.keys(dMap).forEach(dateStr => {
                    let dObj = new Date(dateStr);
                    if(!isHoliday(dObj)) {
                        if(dMap[dateStr].bg.length === 0 && dMap[dateStr].pm.length === 0) {
                            // Seed random based on date to keep it consistent on reload
                            let seedStr = dateStr;
                            let randIdx = Math.abs(hashString(seedStr)) % state.vehicles.length;
                            dMap[dateStr].pm.push({
                                id: state.vehicles[randIdx].id,
                                type: '일일정비',
                                auto: true
                            });
                        }
                    }
                });
            }

            state.schedule = dMap;
        }

        // --- UI Rendering ---
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            const year = state.currentDate.getFullYear();
            const month = state.currentDate.getMonth();
            document.getElementById('current-month-display').innerText = `${year}년 ${month + 1}월`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            // Padding previous month
            for(let i=0; i<firstDay; i++) {
                grid.innerHTML += `<div class="cal-day other-month"></div>`;
            }

            for(let d=1; d<=daysInMonth; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const dayData = state.schedule[dateStr] || {bg:[], pm:[]};
                
                let html = `<div class="cal-day border border-gray-700 flex flex-col gap-1">
                                <div class="text-right text-xs font-bold text-gray-500">${d}</div>`;
                
                dayData.bg.forEach(item => {
                    html += `<div class="text-xs bg-red-600 text-white p-1 rounded truncate shadow" title="${item.id}호 고장: ${item.desc}">
                                🔴 [${item.id}] 고장
                             </div>`;
                });

                dayData.pm.forEach(item => {
                    let vInfo = state.vehicles.find(v => v.id === item.id) || {name: ''};
                    if(item.type === '반기') {
                        html += `<div class="text-xs bg-blue-600 text-white p-1 rounded truncate shadow">🔵 [${item.id}] ${vInfo.name}</div>`;
                    } else if (item.type === '월간') {
                        html += `<div class="text-xs bg-yellow-500 text-gray-900 p-1 rounded truncate shadow font-medium">🟡 [${item.id}] ${vInfo.name}</div>`;
                    } else if (item.auto) {
                        html += `<div class="text-xs bg-green-500 text-gray-900 p-1 rounded truncate shadow font-medium">🟢 [${item.id}] 일일점검</div>`;
                    }
                });

                html += `</div>`;
                grid.innerHTML += html;
            }
        }

        function changeMonth(offset) {
            state.currentDate.setMonth(state.currentDate.getMonth() + offset);
            generateSchedule();
            renderCalendar();
        }

        // --- Breakdown Form Logic ---
        function updateSubCategory() {
            const main = document.getElementById('bd-cat-main').value;
            const sub = document.getElementById('bd-cat-sub');
            const custom = document.getElementById('custom-input-container');
            
            sub.innerHTML = '<option value="">소분류 선택</option>';
            custom.classList.add('hidden');
            
            if(main && subCats[main]) {
                sub.disabled = false;
                subCats[main].forEach(c => {
                    sub.innerHTML += `<option value="${c}">${c}</option>`;
                });
            } else {
                sub.disabled = true;
            }
        }

        function checkCustomInput() {
            const sub = document.getElementById('bd-cat-sub').value;
            const custom = document.getElementById('custom-input-container');
            if(sub === '기타') {
                custom.classList.remove('hidden');
                document.getElementById('bd-custom').required = true;
            } else {
                custom.classList.add('hidden');
                document.getElementById('bd-custom').required = false;
            }
        }

        document.getElementById('breakdown-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('bd-vehicle').value;
            const main = document.getElementById('bd-cat-main').value;
            let sub = document.getElementById('bd-cat-sub').value;
            if(sub === '기타') sub = `기타(${document.getElementById('bd-custom').value})`;
            const desc = document.getElementById('bd-desc').value;
            
            const todayStr = new Date().toISOString().split('T')[0];

            state.breakdowns.push({
                id, date: todayStr, mainCat: main, subCat: sub, desc: desc
            });
            saveState();
            
            alert('고장 접수가 완료되어 최우선 일정으로 달력에 배정되었습니다.');
            e.target.reset();
            updateSubCategory();
            switchTab('dashboard');
        });

        // --- Report Generator ---
        function hashString(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                let char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return hash;
        }

        function seededShuffle(array, seed) {
            let currentIndex = array.length, temporaryValue, randomIndex;
            let currentSeed = seed;
            const random = () => {
                let x = Math.sin(currentSeed++) * 10000;
                return x - Math.floor(x);
            }
            while (0 !== currentIndex) {
                randomIndex = Math.floor(random() * currentIndex);
                currentIndex -= 1;
                temporaryValue = array[currentIndex];
                array[currentIndex] = array[randomIndex];
                array[randomIndex] = temporaryValue;
            }
            return array;
        }

        function cleanItemName(str) {
            // "등 점검" 중복 방지를 위한 끝 단어 제거
            return str.replace(/(점검|확인|검사|상태|수준|유격|장력|류|량)+$/g, '').trim();
        }

        function generateReport(scope) {
            let targetDates = [];
            const today = new Date();
            if(scope === 'today') {
                targetDates.push(today.toISOString().split('T')[0]);
                let tmrw = new Date(today); tmrw.setDate(tmrw.getDate()+1);
                targetDates.push(tmrw.toISOString().split('T')[0]);
            } else {
                // Month
                const year = state.currentDate.getFullYear();
                const month = state.currentDate.getMonth();
                const days = new Date(year, month + 1, 0).getDate();
                for(let d=1; d<=days; d++) {
                    targetDates.push(`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
                }
            }

            let reportLines = [];
            
            targetDates.forEach(dateStr => {
                const dayData = state.schedule[dateStr];
                if(!dayData) return;

                dayData.pm.forEach(task => {
                    let vInfo = state.vehicles.find(v => v.id === task.id);
                    if(!vInfo) return;

                    // 주기 매핑
                    let dbCycle = (task.type === '월간' || task.auto) ? '일일점검' : '정기점검';
                    
                    // DB 항목 추출
                    let availableItems = state.checklist.filter(c => c.group === vInfo.group && c.cycle === dbCycle).map(c => c.item);
                    
                    if(availableItems.length === 0) availableItems = ['엔진오일', '타이어', '제동장치', '등화장치', '냉각수', '조향장치']; // Fallback

                    // 스마트 셔플 (호수 + 날짜 시드)
                    let seed = Math.abs(hashString(task.id + dateStr));
                    let shuffled = seededShuffle([...availableItems], seed);
                    let selected = shuffled.slice(0, 6).map(cleanItemName);

                    // 부족하면 채우기
                    while(selected.length < 6) selected.push("기본점검");

                    let line1 = selected.slice(0, 3).join(', ');
                    let line2 = selected.slice(3, 6).join(', ');
                    let displayType = task.auto ? '일일 정비' : `${task.type} 정비`;

                    let block = `• [${task.id}호] ${vInfo.name} (${displayType}) - ${dateStr} 예정\n` +
                                `  └ ${line1} 등 점검\n` +
                                `  └ ${line2} 등 점검`;
                    reportLines.push(block);
                });
            });

            const outArea = document.getElementById('report-area');
            const outText = document.getElementById('report-output');
            outArea.classList.remove('hidden');
            
            if(reportLines.length === 0) {
                outText.value = "해당 기간에 계획된 예방정비 일정이 없습니다.";
            } else {
                outText.value = reportLines.join('\n\n');
            }
        }

        function copyReportText() {
            const copyText = document.getElementById('report-output');
            copyText.select();
            document.execCommand("copy");
            alert("보고서 내용이 복사되었습니다.");
        }

        // --- Helpers ---
        function updateStats() {
            document.getElementById('stat-vehicles').innerText = state.vehicles.length + ' 대';
            document.getElementById('stat-plans').innerText = state.plans.length + ' 건';
        }

        function populateVehicleSelect() {
            const sel = document.getElementById('bd-vehicle');
            sel.innerHTML = '<option value="">차량 선택</option>';
            state.vehicles.forEach(v => {
                sel.innerHTML += `<option value="${v.id}">[${v.id}호] ${v.name}</option>`;
            });
        }

        function saveState() {
            localStorage.setItem('sys_vehicles', JSON.stringify(state.vehicles));
            localStorage.setItem('sys_checklist', JSON.stringify(state.checklist));
            localStorage.setItem('sys_plans', JSON.stringify(state.plans));
            localStorage.setItem('sys_breakdowns', JSON.stringify(state.breakdowns));
            updateStats();
            populateVehicleSelect();
        }

        function resetData() {
            if(confirm("모든 엑셀 데이터 및 접수 내역을 삭제하시겠습니까? (복구 불가)")) {
                localStorage.clear();
                state.vehicles = []; state.checklist = []; state.plans = []; state.breakdowns = [];
                saveState();
                init();
                alert('초기화 완료');
            }
        }

        // Boot
        window.onload = init;
    </script>
</body>
