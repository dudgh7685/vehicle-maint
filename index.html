<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>차량 예방정비 관리시스템</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkbg: '#121212',
                        darkcard: '#1e1e1e',
                        darkborder: '#2d3748',
                        primary: '#3b82f6',
                        holiday: '#ef4444'
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif; 
            background-color: #121212; 
            color: #f3f4f6; 
            overscroll-behavior-y: none; 
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        ::-webkit-scrollbar { display: none; } /* 스크롤바 숨김 (디자인용) */

        .touch-target { min-height: 64px; display: flex; align-items: center; }
        .touch-btn { 
            min-height: 64px; 
            padding: 0 16px; 
            font-size: 1.125rem; 
            border-radius: 0.75rem; 
            transition: all 0.2s ease; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: bold;
        }
        .touch-btn:active { transform: scale(0.97); }
        
        .touch-input { 
            min-height: 64px; 
            font-size: 1.125rem; 
            padding: 0 16px; 
            border-radius: 0.75rem; 
            background-color: #2d3748; 
            color: white; 
            border: 1px solid #4a5568; 
            width: 100%; 
            appearance: none;
        }
        .touch-input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5); }

        .glove-checkbox { 
            appearance: none; 
            width: 54px; 
            height: 54px; 
            border: 3px solid #718096; 
            border-radius: 0.75rem; 
            background-color: #2d3748; 
            position: relative; 
            cursor: pointer; 
            flex-shrink: 0; 
            transition: all 0.2s;
        }
        .glove-checkbox:checked { background-color: #3b82f6; border-color: #3b82f6; }
        .glove-checkbox:checked::after { 
            content: '\f00c'; 
            font-family: 'Font Awesome 6 Free'; 
            font-weight: 900;
            position: absolute; 
            color: white; 
            font-size: 32px; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
        }

        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-in-out; }
        .accordion-content.open { max-height: 1200px; }

        .exam-highlight { 
            color: #fbbf24; 
            font-weight: 900; 
            background-color: rgba(251, 191, 36, 0.2); 
            padding: 2px 6px; 
            border-radius: 4px; 
            border-bottom: 2px solid #fbbf24;
        }

        .main-content { padding-bottom: 120px; }

        /* 월~금 5일치만 보여주는 달력 그리드 */
        .cal-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 4px; }
        .cal-day { min-height: 100px; padding: 4px; border-radius: 0.5rem; background: #1e1e1e; border: 1px solid #2d3748; display: flex; flex-direction: column; cursor: pointer; }
        .cal-day.holiday { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3); }
        .cal-date-num { font-size: 0.875rem; font-weight: bold; margin-bottom: 4px; }
        .cal-day.holiday .cal-date-num { color: #ef4444; }
        
        /* 뱃지가 숨겨지지 않도록 수정 */
        .sched-badge { font-size: 0.75rem; padding: 4px; border-radius: 4px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: bold; display: block; width: 100%; box-sizing: border-box; }
    </style>

    <script>
        const manifest = {
            "name": "차량 예방정비 관리",
            "short_name": "예방정비",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#121212",
            "theme_color": "#1e1e1e",
            "icons": [{
                "src": "data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%233b82f6'%3E%3Cpath d='M19 8h-1V6a3 3 0 00-3-3H9a3 3 0 00-3 3v2H5a3 3 0 00-3 3v8a1 1 0 001 1h18a1 1 0 001-1v-8a3 3 0 00-3-3zM8 6a1 1 0 011-1h6a1 1 0 011 1v2H8V6zm4 11a2 2 0 110-4 2 2 0 010 4z'/%3E%3C/svg%3E",
                "sizes": "192x192", "type": "image/svg+xml"
            }]
        };
        document.write(`<link rel="manifest" href="${URL.createObjectURL(new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' }))}">`);

        if ('serviceWorker' in navigator) {
            const sw = `
                self.addEventListener('install', e => e.waitUntil(self.skipWaiting()));
                self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
                self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
            `;
            navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw], { type: 'application/javascript' })));
        }
    </script>
</head>
<body>

    <header class="bg-darkcard border-b border-darkborder sticky top-0 z-40 shadow-lg touch-target px-5 justify-between">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 w-12 h-12 flex items-center justify-center rounded-xl shadow-md">
                <i class="fa-solid fa-truck-wrench text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-white">예방정비 관리</h1>
        </div>
    </header>

    <main class="main-content p-4 max-w-4xl mx-auto" id="app-container">
        
        <section id="sec-dashboard" class="space-y-6">
            <h2 class="text-2xl font-bold border-l-4 border-blue-500 pl-3">스마트 스케줄러</h2>
            
            <div class="flex gap-3">
                <!-- 월간 예정사항 단일 버튼으로 통합 -->
                <button onclick="generateMonthlyReport()" class="flex-1 touch-btn bg-indigo-600 hover:bg-indigo-500 text-white shadow-lg flex-col !items-start p-4 h-auto py-5">
                    <span class="text-sm font-normal text-indigo-200"><i class="fa-solid fa-calendar-check mr-1"></i>현재 표시된 달력 기준</span>
                    <span class="text-2xl font-extrabold mt-1" id="btn-report-title">월간 예정 복사</span>
                </button>
                <div class="bg-darkcard p-3 rounded-xl border border-darkborder shadow-md flex flex-col justify-center items-center text-center w-1/3">
                    <p class="text-gray-400 text-sm font-bold mb-1">정비 대수</p>
                    <p class="text-4xl font-extrabold text-white" id="dash-month-count">0<span class="text-sm font-medium text-gray-500 ml-1">대</span></p>
                </div>
            </div>

            <div class="bg-darkcard rounded-2xl border border-darkborder shadow-md overflow-hidden mt-4">
                <div class="p-4 border-b border-darkborder flex justify-between items-center touch-target bg-gray-800">
                    <button onclick="changeMonth(-1)" class="px-5 py-2 text-2xl"><i class="fa-solid fa-chevron-left"></i></button>
                    <h3 class="font-extrabold text-2xl text-white tracking-widest" id="cal-title">2026년 6월</h3>
                    <button onclick="changeMonth(1)" class="px-5 py-2 text-2xl"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
                <div class="p-2">
                    <div class="cal-grid mb-2 text-center text-sm font-bold text-gray-300">
                        <div>월</div><div>화</div><div>수</div><div>목</div><div>금</div>
                    </div>
                    <div id="cal-body" class="cal-grid"></div>
                </div>
                <div class="p-3 bg-gray-800 text-xs text-gray-400 flex justify-around">
                    <span><i class="fa-solid fa-square text-red-500/50 mr-1"></i>사용자 지정 휴무</span>
                    <span><i class="fa-solid fa-arrow-left text-yellow-500 mr-1"></i>당겨진 일정</span>
                </div>
            </div>
        </section>

        <section id="sec-registry" class="hidden space-y-6">
            <h2 class="text-2xl font-bold border-l-4 border-green-500 pl-3">차량대장 관리</h2>
            
            <div class="bg-darkcard p-5 rounded-2xl border border-darkborder shadow-md space-y-5">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="font-bold text-lg text-white">엑셀 일괄 업로드</h3>
                    <label class="bg-green-600 hover:bg-green-500 text-white px-5 py-3 rounded-xl cursor-pointer flex items-center text-base font-bold shadow-lg">
                        <i class="fa-solid fa-file-excel mr-2 text-xl"></i>업로드
                        <input type="file" id="excel-upload" accept=".xlsx, .xls" class="hidden" onchange="handleExcelUpload(event)">
                    </label>
                </div>
                <p class="text-sm text-gray-400">※ 기존에 등록된 데이터와 중복되는 내역은 자동으로 걸러냅니다.</p>
            </div>

            <div class="space-y-4" id="vehicle-list"></div>
        </section>

        <section id="sec-maintenance" class="hidden space-y-6">
            <h2 class="text-2xl font-bold border-l-4 border-blue-400 pl-3">예방정비 수행</h2>
            
            <div class="bg-darkcard p-5 rounded-2xl border border-darkborder shadow-md space-y-5">
                <select id="maint-vehicle" class="touch-input font-bold text-white" onchange="loadChecklist()">
                    <option value="">대상 차량 (호수) 선택</option>
                </select>
                <select id="maint-type" class="touch-input font-bold text-blue-300" onchange="loadChecklist()">
                    <option value="일일">일일 예방정비 (일일)</option>
                    <option value="월간">월간 예방정비 (일일+월간 누적)</option>
                    <option value="반년">반년 예방정비 (일일+월간+반년 누적)</option>
                </select>
            </div>

            <div id="checklist-container" class="space-y-4">
                <div class="text-center text-gray-500 py-20 bg-darkcard rounded-2xl border border-darkborder">
                    <i class="fa-solid fa-clipboard-check text-6xl mb-4 opacity-30"></i><br>
                    <span class="font-bold text-lg">차량과 정비 주기를 선택해 주세요.</span>
                </div>
            </div>

            <button id="btn-submit-maint" onclick="submitMaintenance()" class="touch-btn bg-blue-600 hover:bg-blue-500 text-white w-full hidden mt-8 shadow-lg shadow-blue-500/30 text-xl">
                <i class="fa-solid fa-check-circle text-2xl"></i> 완료 및 일지 생성
            </button>
        </section>

        <section id="sec-trouble" class="hidden space-y-6">
            <h2 class="text-2xl font-bold border-l-4 border-yellow-500 pl-3">고장 진단 가이드</h2>
            <div id="trouble-list" class="space-y-4"></div>
        </section>

        <section id="sec-settings" class="hidden space-y-6">
            <h2 class="text-2xl font-bold border-l-4 border-purple-500 pl-3">설정 및 이력 관리</h2>
            
            <div class="bg-darkcard p-5 rounded-2xl border border-darkborder shadow-md space-y-4">
                <h3 class="font-bold text-lg text-white mb-2">정비일지 이력</h3>
                <div class="flex gap-3">
                    <div class="relative flex-1">
                        <i class="fa-solid fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 text-xl"></i>
                        <input type="text" id="log-search" class="touch-input pl-14" placeholder="차량번호 검색" onkeyup="renderLogs()">
                    </div>
                    <button onclick="downloadCSV()" class="touch-btn bg-gray-700 hover:bg-gray-600 text-white w-32">
                        <i class="fa-solid fa-download"></i> CSV
                    </button>
                </div>
                <div id="log-list" class="space-y-4 mt-4 max-h-[400px] overflow-y-auto pr-2"></div>
            </div>

            <div class="bg-darkcard p-5 rounded-2xl border border-darkborder shadow-md space-y-4">
                <h3 class="font-bold text-lg text-white mb-2">체크리스트 (DB) 편집</h3>
                <select id="edit-type" class="touch-input" onchange="renderEditor()"><option value="">차종 선택</option></select>
                <select id="edit-cycle" class="touch-input" onchange="renderEditor()">
                    <option value="일일">일일</option><option value="월간">월간</option><option value="반년">반년</option>
                </select>
                <div id="edit-container" class="space-y-3 mt-4"></div>
                <button onclick="addDbItem()" class="touch-btn bg-green-600 hover:bg-green-500 text-white w-full mt-4"><i class="fa-solid fa-plus"></i> 항목 추가</button>
                <button onclick="resetDB()" class="touch-btn bg-red-900/50 text-red-400 border border-red-800 w-full mt-2"><i class="fa-solid fa-rotate-right"></i> 초기 DB로 복원</button>
            </div>
        </section>

    </main>

    <nav class="bg-darkcard border-t border-darkborder fixed bottom-0 w-full z-40 flex justify-around items-center h-[96px] pb-safe shadow-[0_-5px_20px_rgba(0,0,0,0.5)]">
        <button onclick="switchTab('dashboard')" class="flex-1 flex flex-col items-center justify-center h-full text-gray-500 hover:text-blue-400" id="tab-dashboard">
            <i class="fa-solid fa-calendar-check text-3xl mb-1.5"></i><span class="text-sm font-extrabold">대시보드</span>
        </button>

            <i class="fa-solid fa-truck text-3xl mb-1.5"></i><span class="text-sm font-extrabold">차량대장</span>
        </button>

            <i class="fa-solid fa-wrench text-3xl mb-1.5"></i><span class="text-sm font-extrabold">정비수행</span>

        <button onclick="switchTab('trouble')" class="flex-1 flex flex-col items-center justify-center h-full text-gray-500 hover:text-yellow-400" id="tab-trouble">

        </button>
        <button onclick="switchTab('settings')" class="flex-1 flex flex-col items-center justify-center h-full text-gray-500 hover:text-purple-400" id="tab-settings">
            <i class="fa-solid fa-gear text-3xl mb-1.5"></i><span class="text-sm font-extrabold">설정</span>
        </button>
    </nav>

        <div class="bg-darkcard w-full max-w-lg rounded-2xl border border-darkborder shadow-2xl overflow-hidden flex flex-col">
            <div class="bg-blue-600 p-5 flex justify-between items-center touch-target">

            <div class="p-5 border-t border-darkborder bg-gray-800">
                <button onclick="copyModalText()" class="touch-btn bg-blue-600 hover:bg-blue-500 text-white w-full shadow-lg text-xl">
                    <i class="fa-solid fa-copy text-2xl"></i> 클립보드 복사
                </button>
            </div>
        </div>
    </div>

        function mapVehicleType(name) {
            if (name.includes("30kw") || name.includes("발전기")) return null;
            
            if (/K-?511/.test(name)) return "2.5톤 표준차량";
            if (/K-?311|1 1\/4톤|1¼/.test(name)) return "1¼ 표준차량";
            if (/K-?711/.test(name)) return "5톤 표준차량";
            
            if (/덤프|유조차|트랙터|11\.5톤|15톤|탱크형/.test(name)) return "대형트럭/유조차";
            if (/마이티|5톤|화물용|화물차|픽업형|봉고|2\.5톤/.test(name)) return "상용트럭(1~5톤)";
            if (/스타렉스|승합|버스|12인승/.test(name)) return "승합차";
            if (/냉동|부식/.test(name)) return "냉동부식차";
            if (/코란도|짚|왜곤/.test(name)) return "승용차계열";
            if (/트레일러|샤시/.test(name)) return "트레일러";
            return "상용트럭(1~5톤)";
        }

        function init() {
            const lsCustomDB = localStorage.getItem('vms_custom_db');
            if(lsCustomDB) db = JSON.parse(lsCustomDB);
            
            const lsHolidays = localStorage.getItem('vms_holidays');
            if(lsHolidays) holidays = JSON.parse(lsHolidays);

            const lsVehicles = localStorage.getItem('vms_vehicles');
            const lsSchedules = localStorage.getItem('vms_schedules');
            const lsLogs = localStorage.getItem('vms_logs');

            if(lsVehicles && JSON.parse(lsVehicles).length > 0) {
                vehicles = JSON.parse(lsVehicles);
                schedules = JSON.parse(lsSchedules);
            } else {
                const lines = csvRawData.split('\n');
                lines.forEach((line, i) => {
                    if (i === 0 || !line.trim()) return;
                    const cols = line.split(',');
                    const vName = cols[0].trim();
                    const vType = mapVehicleType(vName);
                    
                    if (vType) { 
                        const cycle = cols[3].includes("반기") ? "반년" : (cols[3].includes("월간") ? "월간" : "일일");
                        const vId = Date.now() + i;
                        vehicles.push({ id: vId, plate: cols[1].trim(), name: vName, type: vType });
                        schedules.push({ vId: vId, type: vType, cycle: cycle, originalDate: cols[2].trim(), assignedDate: cols[2].trim() });
                    }
                });
                recalcAllSchedules(); 
                saveData();
            }
            if(lsLogs) logs = JSON.parse(lsLogs);

            const typeSelect = document.getElementById('edit-type');
            Object.keys(db).forEach(t => {
                typeSelect.innerHTML += `<option value="${t}">${t}</option>`;
            });

            const tList = document.getElementById('trouble-list');
            troubleshootingDB.forEach((item, i) => {
                tList.innerHTML += `
                    <div class="bg-darkcard border border-darkborder rounded-xl overflow-hidden shadow">
                        <button onclick="toggleAccordion('trb-${i}')" class="w-full px-5 py-4 text-left flex justify-between items-center text-yellow-400 bg-gray-800 touch-target font-bold">
                            <span>[${item.sys}] ${item.sym}</span><i class="fa-solid fa-chevron-down transition-transform" id="icon-trb-${i}"></i>
                        </button>
                        <div id="trb-${i}" class="accordion-content bg-[#121212] px-5"><p class="py-5 text-gray-300 font-bold leading-relaxed text-base whitespace-pre-line"><i class="fa-solid fa-wrench mr-2 text-blue-500"></i>점검포인트:\n${item.chk}</p></div>
                    </div>`;
            });

            switchTab('dashboard');
        }

        function saveData() {
            localStorage.setItem('vms_custom_db', JSON.stringify(db));
            localStorage.setItem('vms_vehicles', JSON.stringify(vehicles));
            localStorage.setItem('vms_schedules', JSON.stringify(schedules));
            localStorage.setItem('vms_holidays', JSON.stringify(holidays));
            localStorage.setItem('vms_logs', JSON.stringify(logs));
        }

        function switchTab(tabId) {
            ['dashboard', 'registry', 'maintenance', 'trouble', 'settings'].forEach(t => {
                document.getElementById(`sec-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('text-blue-500', 'text-green-500', 'text-purple-500', 'text-yellow-400');
                document.getElementById(`tab-${t}`).classList.add('text-gray-500');
            });
            document.getElementById(`sec-${tabId}`).classList.remove('hidden');
            
            const colors = { 'dashboard':'text-blue-500', 'registry':'text-green-500', 'maintenance':'text-blue-500', 'trouble':'text-yellow-400', 'settings':'text-purple-500' };
            document.getElementById(`tab-${tabId}`).classList.remove('text-gray-500');
            document.getElementById(`tab-${tabId}`).classList.add(colors[tabId].split(' ')[0]);

            if(tabId === 'dashboard') { renderCalendar(); }
            if(tabId === 'registry') { renderRegistry(); }
            if(tabId === 'maintenance') { renderMaintenanceOptions(); }
            if(tabId === 'settings') { renderLogs(); renderEditor(); }
        }

        function toggleAccordion(id) {
            const content = document.getElementById(id);
            const icon = document.getElementById('icon-' + id);
            content.classList.toggle('open');
            icon.style.transform = content.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        function isHolidayOrWeekend(dateStr) {
            const parts = dateStr.split('-');
            const d = new Date(parts[0], parts[1] - 1, parts[2]);
            const day = d.getDay();
            return day === 0 || day === 6 || holidays.includes(dateStr);
        }

        function recalcAllSchedules() {
            const assignedCount = {};
            schedules.sort((a,b) => a.originalDate.localeCompare(b.originalDate));

            schedules.forEach(s => {
                const parts = s.originalDate.split('-');
                const origDate = new Date(parts[0], parts[1] - 1, parts[2]);
                const origMonth = origDate.getMonth();
                
                let targetStr = null;

                let dt = new Date(origDate);
                for(let i=0; i<7; i++) {
                    if (dt.getMonth() !== origMonth) break; 
                    let str = `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-${String(dt.getDate()).padStart(2, '0')}`;
                    if(!isHolidayOrWeekend(str) && (!assignedCount[str] || assignedCount[str] === 0)) {
                        targetStr = str; break;
                    }
                    dt.setDate(dt.getDate() - 1);
                }

                if(!targetStr) {
                    dt = new Date(origDate);
                    for(let i=0; i<7; i++) {
                        if (dt.getMonth() !== origMonth) break;
                        let str = `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-${String(dt.getDate()).padStart(2, '0')}`;
                        if(!isHolidayOrWeekend(str) && (!assignedCount[str] || assignedCount[str] === 0)) {
                            targetStr = str; break;
                        }
                        dt.setDate(dt.getDate() + 1);
                    }
                }

                if(!targetStr) {
                    dt = new Date(origDate);
                    for(let i=0; i<15; i++) {
                        if (dt.getMonth() === origMonth) {
                            let str = `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-${String(dt.getDate()).padStart(2, '0')}`;
                            if(!isHolidayOrWeekend(str) && (!assignedCount[str] || assignedCount[str] < 2)) {
                                targetStr = str; break;
                            }
                        }
                        dt.setDate(dt.getDate() - 1);
                    }
                }

                if(!targetStr) {
                    let fallback = new Date(origDate);
                    let fallbackStr = `${fallback.getFullYear()}-${String(fallback.getMonth() + 1).padStart(2, '0')}-${String(fallback.getDate()).padStart(2, '0')}`;
                    while(isHolidayOrWeekend(fallbackStr)) {
                        fallback.setDate(fallback.getDate() - 1);
                        fallbackStr = `${fallback.getFullYear()}-${String(fallback.getMonth() + 1).padStart(2, '0')}-${String(fallback.getDate()).padStart(2, '0')}`;
                    }
                    targetStr = fallbackStr;
                }

                s.assignedDate = targetStr;
                assignedCount[targetStr] = (assignedCount[targetStr] || 0) + 1;
            });
        }

        function toggleHoliday(dateStr) {
            const isAlreadyHoliday = holidays.includes(dateStr);
            const msg = isAlreadyHoliday ? "휴일 설정을 해제하시겠습니까?" : "휴일로 바꾸겠습니까?";
            
            if(confirm(msg)) {
                if(isAlreadyHoliday) {
                    holidays.splice(holidays.indexOf(dateStr), 1);
                } else {
                    holidays.push(dateStr);
                }
                recalcAllSchedules();
                saveData();
                renderCalendar();
            }
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            renderCalendar();
        }

        // 월~금 5일치만 보여주도록 개선된 달력 렌더링 함수
        function renderCalendar() {
            const y = currentDate.getFullYear();
            const m = currentDate.getMonth();
            document.getElementById('cal-title').innerText = `${y}년 ${m+1}월`;
            document.getElementById('btn-report-title').innerText = `${m+1}월 예정 복사`;

            const daysInMonth = new Date(y, m+1, 0).getDate();
            const calBody = document.getElementById('cal-body');
            
            let calBodyHtml = '';
            let monthCount = 0;

            for(let d=1; d<=daysInMonth; d++) {
                let dateObj = new Date(y, m, d);
                let dayOfWeek = dateObj.getDay();
                
                // 주말은 달력 UI에서 완전히 제외
                if (dayOfWeek === 0 || dayOfWeek === 6) continue;

                const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                
                // 첫 주차 평일 시작 전 빈 칸(패딩) 생성
                if (calBodyHtml === '') {
                    // 월=1, 화=2... 금=5 -> dayOfWeek - 1 만큼 빈 칸
                    for (let i = 0; i < dayOfWeek - 1; i++) {
                        calBodyHtml += `<div></div>`;
                    }
                }

                const isHol = holidays.includes(dateStr);
                
                const dayScheds = schedules.filter(s => s.assignedDate === dateStr);
                monthCount += dayScheds.length;

                let badges = '';
                dayScheds.forEach(s => {
                    const v = vehicles.find(x => x.id === s.vId);
                    const color = s.cycle === '반년' ? 'bg-red-600' : (s.cycle === '월간' ? 'bg-amber-600' : 'bg-blue-600');
                    const avoidTag = s.assignedDate !== s.originalDate ? `<i class="fa-solid fa-arrow-left text-yellow-300"></i> ` : '';
                    
                    badges += `<div class="${color} text-white sched-badge" onclick="event.stopPropagation(); goToMaint(${v.id}, '${s.cycle}', '${s.originalDate}', '${s.assignedDate}')">${avoidTag}${v.plate}</div>`;
                });

                calBodyHtml += `
                    <div class="cal-day ${isHol ? 'holiday' : ''}" onclick="toggleHoliday('${dateStr}')">
                        <div class="cal-date-num">${d}</div>
                        <!-- 배지가 많아도 숨겨지지 않고 스크롤 되도록 변경 -->
                        <div class="flex-1 flex flex-col gap-1 overflow-y-auto">${badges}</div>
                    </div>
                `;
            }
            
            calBody.innerHTML = calBodyHtml;
            document.getElementById('dash-month-count').innerHTML = `${monthCount}<span class="text-sm font-medium text-gray-500 ml-1">대</span>`;
        }

        function goToMaint(vId, cycle, origDate, assignDate) {
            let msg = "해당 차량의 예방정비를 수행하시겠습니까?";
            
            if (origDate && assignDate && origDate !== assignDate) {
                const d1 = new Date(origDate.split('-')[0], origDate.split('-')[1] - 1, origDate.split('-')[2]);
                const d2 = new Date(assignDate.split('-')[0], assignDate.split('-')[1] - 1, assignDate.split('-')[2]);
                const diff = Math.round((d1 - d2) / (1000 * 60 * 60 * 24));
                
                msg = `원래 계획일(${origDate})에서 [ ${diff}일 ] 앞당겨진 일정입니다.\n\n정비를 수행하시겠습니까?`;
            }
            
            if(confirm(msg)) {
                switchTab('maintenance');
                setTimeout(() => {
                    document.getElementById('maint-vehicle').value = vId;
                    document.getElementById('maint-type').value = cycle;
                    loadChecklist();
                }, 50);
            }
        }

        function generateMonthlyReport() {
            const y = currentDate.getFullYear();
            const m = currentDate.getMonth();
            const startDate = new Date(y, m, 1);
            const endDate = new Date(y, m + 1, 0);

            const tStart = startDate.toISOString().split('T')[0];
            const tEnd = endDate.toISOString().split('T')[0];

            let targetScheds = schedules.filter(s => s.assignedDate >= tStart && s.assignedDate <= tEnd);
            targetScheds.sort((a,b) => a.assignedDate.localeCompare(b.assignedDate));

            if(targetScheds.length === 0) { alert(`${m+1}월에 계획된 예방정비 일정이 없습니다.`); return; }

            let report = `[${y}년 ${m+1}월 예방정비 예정사항]\n\n`;
            
            targetScheds.forEach(s => {
                const v = vehicles.find(x => x.id === s.vId);
                const list = getCascadingItems(s.type, s.cycle);
                
                const offset = v.id % Math.max(1, list.length);
                const picked = [];
                for(let i=0; i<3 && i<list.length; i++) {
                    picked.push(list[(offset + i) % list.length].항목);
                }
                
                const shortName = v.name.split(' ')[0];
                const dObj = new Date(s.assignedDate);
                const mmdd = (dObj.getMonth()+1) + '/' + dObj.getDate();
                
                report += `• ${shortName} ${v.plate}호 ${s.cycle}정비\n`;
                if(picked.length > 0) {
                    report += `- ${picked.join(', ')} 등 점검 예정 (${mmdd})\n\n`;
                }
            });

            showModal(report.trim());
        }

        function renderRegistry() {
            const list = document.getElementById('vehicle-list');
            list.innerHTML = '';
            
            const formatDate = (dateStr) => {
                const [y, m, d] = dateStr.split('-');
                return `${y}년 ${parseInt(m)}월 ${parseInt(d)}일`;
            };

            vehicles.forEach(v => {
                const sMonth = schedules.find(x => x.vId === v.id && x.cycle === '월간');
                const sHalf = schedules.find(x => x.vId === v.id && x.cycle === '반년');
                list.innerHTML += `
                    <div class="bg-darkcard border border-darkborder p-5 rounded-2xl shadow-md">
                        <h4 class="font-extrabold text-2xl text-white">${v.plate}</h4>
                        <p class="text-sm text-green-400 font-bold mt-1 mb-3">${v.name} (${v.type})</p>
                        ${sMonth ? `<p class="text-sm text-gray-400"><i class="fa-solid fa-calendar-day mr-1"></i> 월간 예정: ${formatDate(sMonth.assignedDate)}</p>` : ''}
                        ${sHalf ? `<p class="text-sm text-gray-400 mt-1"><i class="fa-solid fa-calendar-day mr-1"></i> 반년 예정: ${formatDate(sHalf.assignedDate)}</p>` : ''}
                    </div>
                `;
            });
        }

        function handleExcelUpload(event) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
                    
                    let count = 0;
                    for(let i=1; i<json.length; i++) {
                        const r = json[i];
                        if(r.length >= 4 && r[1]) {
                            const plate = String(r[1]).trim();
                            const name = String(r[0]).trim();
                            const vType = mapVehicleType(name);
                            
                            if(!vType) continue; 
                            
                            const origDate = r[2] || new Date().toISOString().split('T')[0];
                            let cycleStr = String(r[3] || '');
                            const cycle = cycleStr.includes("반기") ? "반년" : (cycleStr.includes("월간") ? "월간" : "일일");
                            
                            let v = vehicles.find(x => x.plate === plate);
                            if(!v) {
                                v = { id: Date.now() + i, plate, name, type: vType };
                                vehicles.push(v);
                            }

                            const isDup = schedules.some(x => x.vId === v.id && x.originalDate === origDate && x.cycle === cycle);
                            
                            if(!isDup) {
                                schedules.push({ vId: v.id, type: vType, cycle, originalDate: origDate, assignedDate: origDate });
                                count++;
                            }
                        }
                    }
                    recalcAllSchedules();
                    saveData();
                    renderRegistry();
                    alert(`✅ ${count}건 신규 업로드 완료 (중복 제외됨)`);
                } catch(err) { alert("엑셀 읽기 오류"); }
                event.target.value = '';
            };
            reader.readAsArrayBuffer(file);
        }

        function renderMaintenanceOptions() {
            const sel = document.getElementById('maint-vehicle');
            sel.innerHTML = '<option value="">대상 차량 (호수) 선택</option>';
            vehicles.forEach(v => { sel.innerHTML += `<option value="${v.id}">${v.plate} (${v.type})</option>`; });
            document.getElementById('checklist-container').innerHTML = '';
            document.getElementById('btn-submit-maint').classList.add('hidden');
        }

        function getCascadingItems(type, freq) {
            const data = db[type];
            if(!data) return [];
            let items = [];
            if(freq === '일일' || freq === '월간' || freq === '반년') items = items.concat((data['일일']||[]).map(x => ({...x, badge:'일일', color:'bg-blue-600'})));
            if(freq === '월간' || freq === '반년') items = items.concat((data['월간']||[]).map(x => ({...x, badge:'월간', color:'bg-amber-600'})));
            if(freq === '반년') items = items.concat((data['반년']||[]).map(x => ({...x, badge:'반년', color:'bg-red-600'})));
            return items;
        }

        function highlightExamText(text) {
            const regex = /(1만Km|12개월|최고점\s*\(?F\)?|\d+개소|\d+(?:\.\d+)?(?:~\d+(?:\.\d+)?)?(?:mm|cm|kg|F|점|V|A|%|Km|개월)|[A-Za-z]+)/gi;
            return text.replace(regex, '<span class="exam-highlight">$&</span>');
        }

        function loadChecklist() {
            const vId = document.getElementById('maint-vehicle').value;
            const freq = document.getElementById('maint-type').value;
            const container = document.getElementById('checklist-container');
            const submitBtn = document.getElementById('btn-submit-maint');

            if(!vId) { container.innerHTML = ''; submitBtn.classList.add('hidden'); return; }

            const v = vehicles.find(x => x.id == vId);
            const items = getCascadingItems(v.type, freq);

            if(items.length === 0) {
                container.innerHTML = `<div class="text-center py-10 font-bold">기준이 없습니다.</div>`;
                submitBtn.classList.add('hidden'); return;
            }

            container.innerHTML = '';
            items.forEach((item, idx) => {
                const desc = highlightExamText(item.정비방법);
                container.innerHTML += `
                    <div class="bg-darkcard border border-darkborder rounded-2xl overflow-hidden shadow">
                        <label class="flex items-center p-4 touch-target gap-4 cursor-pointer hover:bg-gray-800">
                            <input type="checkbox" class="glove-checkbox chk-item" value="${item.항목}">
                            <div class="flex-1">
                                <span class="${item.color} text-[11px] px-2 py-1 rounded text-white font-extrabold mb-1 inline-block">${item.badge}</span>
                                <div class="font-bold text-xl text-white tracking-wide leading-tight">${item.항목}</div>
                            </div>
                        </label>
                        <div class="border-t border-darkborder">
                            <button onclick="toggleAccordion('chk-acc-${idx}')" class="w-full px-4 py-3 text-left flex justify-between items-center text-blue-400 bg-gray-800 touch-target font-extrabold">
                                <span><i class="fa-solid fa-circle-info mr-2"></i>상세 정비방법 보기</span><i class="fa-solid fa-chevron-down" id="icon-chk-acc-${idx}"></i>
                            </button>
                            <div id="chk-acc-${idx}" class="accordion-content bg-[#121212] px-4"><p class="py-4 text-gray-300 font-bold text-base whitespace-pre-line">${desc}</p></div>
                        </div>
                    </div>`;
            });
            submitBtn.classList.remove('hidden');
        }

        function submitMaintenance() {
            const chks = document.querySelectorAll('.chk-item');
            const checked = Array.from(chks).filter(c => c.checked).map(c => c.value);
            if(checked.length === 0) { alert("1개 이상 체크하세요."); return; }
            
            const vId = document.getElementById('maint-vehicle').value;
            const v = vehicles.find(x => x.id == vId);
            const freq = document.getElementById('maint-type').value;
            const dateStr = new Date().toISOString().split('T')[0];

            const rephrased = checked.map(item => `${item} 상태 점검 완료`);
            const report = `[${v.plate} ${v.name} ${freq} 예방정비 결과]\n- 중점 정비사항: ${rephrased.join(', ')}\n- 결과: 이상 없음 (특이사항 없음)`;

            logs.unshift({ id: Date.now(), date: dateStr, plate: v.plate, type: v.type, cycle: freq, summary: report });
            
            schedules = schedules.filter(s => !(s.vId == vId && s.cycle == freq && s.assignedDate <= dateStr));
            
            saveData();
            showModal(report);
            chks.forEach(c => c.checked = false);
        }

        function showModal(text) {
            document.getElementById('modal-text').value = text;
            document.getElementById('modal-result').classList.remove('hidden');
            document.getElementById('modal-result').classList.add('flex');
        }
        function closeModal() {
            document.getElementById('modal-result').classList.add('hidden');
            document.getElementById('modal-result').classList.remove('flex');
        }
        function copyModalText() {
            const t = document.getElementById('modal-text');
            t.select(); document.execCommand('copy');
            alert("✅ 복사되었습니다.");
            closeModal();
        }

        function renderLogs() {
            const q = document.getElementById('log-search').value.toLowerCase();
            const list = document.getElementById('log-list');
            list.innerHTML = '';
            const f = logs.filter(l => l.plate.toLowerCase().includes(q) || l.type.toLowerCase().includes(q));
            f.forEach(l => {
                list.innerHTML += `
                    <div class="bg-gray-800 border border-darkborder p-4 rounded-xl shadow mb-3">
                        <div class="flex justify-between items-center mb-2 border-b border-darkborder pb-2">
                            <div><span class="font-extrabold text-white text-lg">${l.plate}</span> <span class="text-xs text-gray-400">${l.type}</span></div>
                            <div class="text-right"><span class="bg-purple-600 text-white text-[10px] px-2 py-0.5 rounded font-bold">${l.cycle}</span> <span class="text-[10px] text-gray-500">${l.date}</span></div>
                        </div>
                        <p class="text-xs text-gray-300 font-mono whitespace-pre-wrap">${l.summary}</p>
                    </div>`;
            });
        }

        function downloadCSV() {
            if(logs.length===0) return alert("데이터 없음");
            let csv = '\uFEFF일자,차량번호,차종,주기,내용\n';
            logs.forEach(l => csv += `"${l.date}","${l.plate}","${l.type}","${l.cycle}","${l.summary.replace(/"/g, '""').replace(/\n/g, ' ')}"\n`);
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            link.download = `정비일지_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }

        function renderEditor() {
            const t = document.getElementById('edit-type').value;
            const c = document.getElementById('edit-cycle').value;
            const con = document.getElementById('edit-container');
            con.innerHTML = '';
            if(!t || !db[t] || !db[t][c]) return;

            db[t][c].forEach((item, i) => {
                con.innerHTML += `
                    <div class="flex gap-2 items-center bg-gray-800 p-2 rounded border border-darkborder">
                        <input type="text" class="flex-1 bg-transparent text-sm text-white focus:outline-none" value="${item.항목}" onchange="updateDbItem('${t}','${c}',${i},'항목',this.value)">
                        <button onclick="delDbItem('${t}','${c}',${i})" class="text-red-500 px-3 py-2 bg-red-500/10 rounded"><i class="fa-solid fa-trash"></i></button>
                    </div>`;
            });
        }

        function updateDbItem(t, c, i, key, val) { db[t][c][i][key] = val; saveData(); }
        function delDbItem(t, c, i) { if(confirm("삭제?")) { db[t][c].splice(i,1); saveData(); renderEditor(); } }
        function addDbItem() {
            const t = document.getElementById('edit-type').value;
            const c = document.getElementById('edit-cycle').value;
            if(!t) return alert("차종 선택");
            if(!db[t][c]) db[t][c] = [];
            db[t][c].push({ 항목: "새 항목", 정비방법: "정비방법 입력" });
            saveData(); renderEditor();
        }
        function resetDB() {
            if(confirm("기본 DB로 초기화합니다. 직접 추가한 항목이 삭제됩니다.")) {
                db = JSON.parse(JSON.stringify(defaultMaintenanceDB));
                saveData(); renderEditor(); alert("초기화 완료");
            }
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
