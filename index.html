<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>부대 차량 예방/고장정비 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; padding-bottom: 80px; }
        .tab-content.active { display: block; }
        .grid-cols-5 { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 0.25rem; }
        .min-h-day { min-height: 85px; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .bottom-nav { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="text-gray-800 antialiased h-screen flex flex-col">
    <header class="bg-slate-800 text-white p-4 shadow-md sticky top-0 z-20 flex justify-center items-center">
        <h1 class="text-lg font-bold"><i class="fas fa-truck-wrench mr-2"></i>통합 정비 관리 시스템</h1>
    </header>

    <main class="flex-1 overflow-y-auto w-full max-w-3xl mx-auto p-3 relative">
        <section id="tab-dashboard" class="tab-content active space-y-4">
            <div class="flex flex-wrap gap-2 justify-between bg-white p-3 rounded shadow-sm border border-gray-200 items-center">
                <button onclick="changeMonth(-1)" class="p-2 text-gray-500 hover:text-slate-800"><i class="fas fa-chevron-left"></i></button>
                <h2 id="current-month-display" class="text-lg font-bold"></h2>
                <button onclick="changeMonth(1)" class="p-2 text-gray-500 hover:text-slate-800"><i class="fas fa-chevron-right"></i></button>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="openReportModal('today')" class="bg-indigo-600 active:bg-indigo-700 text-white py-2 rounded shadow text-sm font-semibold"><i class="fas fa-file-alt mr-1"></i>오늘/내일 복사</button>
                <button onclick="openReportModal('month')" class="bg-purple-600 active:bg-purple-700 text-white py-2 rounded shadow text-sm font-semibold"><i class="fas fa-calendar-alt mr-1"></i>월간 보고서 복사</button>
            </div>
            <div class="bg-white rounded shadow-sm border border-gray-200 overflow-hidden">
                <div class="grid-cols-5 bg-slate-100 border-b border-gray-200 text-center text-xs font-bold text-gray-600 py-2">
                    <div>월</div><div>화</div><div>수</div><div>목</div><div>금</div>
                </div>
                <div id="calendar-grid" class="grid-cols-5 p-1 bg-slate-50"></div>
            </div>
            <div class="flex flex-wrap gap-2 text-xs justify-center p-2">
                <span class="px-2 py-1 bg-red-600 text-white rounded">고장정비</span>
                <span class="px-2 py-1 bg-blue-600 text-white rounded">반기(정기)</span>
                <span class="px-2 py-1 bg-yellow-500 text-black font-bold rounded">월간(일일)</span>
                <span class="px-2 py-1 bg-green-500 text-white rounded">자동할당</span>
            </div>
        </section>

        <section id="tab-breakdown" class="tab-content">
            <div class="bg-white p-4 rounded shadow-sm border border-gray-200">
                <h2 class="text-lg font-bold border-b pb-2 mb-4 text-slate-800"><i class="fas fa-wrench mr-2"></i>고장정비 접수</h2>
                <form id="form-breakdown" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">대상 차량</label>
                        <select id="bd-vehicle" required class="w-full border rounded p-2 text-sm bg-gray-50 focus:ring-2 focus:ring-slate-400"></select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">대분류</label>
                        <select id="bd-main-cat" onchange="updateSubCat()" required class="w-full border rounded p-2 text-sm bg-gray-50 focus:ring-2 focus:ring-slate-400">
                            <option value="">선택</option>
                            <option value="엔진">엔진 장치</option>
                            <option value="조향">조향 장치</option>
                            <option value="제동">제동 장치</option>
                            <option value="구동">구동/현가 장치</option>
                            <option value="전장">전장/편의 장치</option>
                            <option value="특장">특장 장치</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">소분류</label>
                        <select id="bd-sub-cat" onchange="toggleCustomSub()" required class="w-full border rounded p-2 text-sm bg-gray-50 focus:ring-2 focus:ring-slate-400 disabled:bg-gray-200" disabled>
                            <option value="">대분류를 선택하세요</option>
                        </select>
                    </div>
                    <div id="wrap-bd-custom" class="hidden">
                        <label class="block text-xs font-bold text-gray-500 mb-1">기타 (직접입력)</label>
                        <input type="text" id="bd-custom" class="w-full border rounded p-2 text-sm bg-gray-50 focus:ring-2 focus:ring-slate-400">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">고장 내용</label>
                        <textarea id="bd-desc" required class="w-full border rounded p-2 text-sm bg-gray-50 h-20 focus:ring-2 focus:ring-slate-400"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-slate-800 text-white font-bold py-3 rounded shadow active:bg-slate-900">접수 및 달력 배정</button>
                </form>
            </div>
        </section>

        <section id="tab-maintenance" class="tab-content">
            <div class="bg-white p-4 rounded shadow-sm border border-gray-200">
                <h2 class="text-lg font-bold border-b pb-2 mb-4 text-slate-800"><i class="fas fa-clipboard-check mr-2"></i>정비 수행</h2>
                <div class="space-y-3 mb-4">
                    <select id="mt-vehicle" class="w-full border rounded p-2 text-sm bg-gray-50" onchange="renderChecklist()"></select>
                    <select id="mt-cycle" class="w-full border rounded p-2 text-sm bg-gray-50" onchange="renderChecklist()">
                        <option value="">점검 주기 선택</option>
                        <option value="일일점검">월간/일일 예방정비</option>
                        <option value="정기점검">반기 정기점검</option>
                    </select>
                </div>
                <div id="checklist-area" class="space-y-2 border-t pt-4 min-h-[150px]">
                    <p class="text-center text-sm text-gray-400 mt-4">차량 및 주기를 선택하세요.</p>
                </div>
            </div>
        </section>

        <section id="tab-settings" class="tab-content">
            <div class="bg-white p-4 rounded shadow-sm border border-gray-200 space-y-6">
                <div>
                    <h2 class="text-lg font-bold text-slate-800 mb-2"><i class="fas fa-file-excel mr-2 text-green-600"></i>엑셀 데이터 연동</h2>
                    <input type="file" id="excel-upload" accept=".xlsx, .xls" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-slate-100 file:text-slate-700 hover:file:bg-slate-200">
                </div>
                <div class="grid grid-cols-2 gap-3 text-center border-y py-4 border-gray-100">
                    <div><p class="text-xs text-gray-400">등록 차량</p><p id="stat-veh" class="text-xl font-bold text-slate-800">0대</p></div>
                    <div><p class="text-xs text-gray-400">정비 계획</p><p id="stat-plan" class="text-xl font-bold text-slate-800">0건</p></div>
                </div>
                <button onclick="resetSystem()" class="w-full bg-red-100 text-red-600 hover:bg-red-200 font-bold py-3 rounded text-sm"><i class="fas fa-trash-alt mr-1"></i>데이터 전체 초기화</button>
            </div>
        </section>
    </main>

    <nav class="bottom-nav bg-white border-t border-gray-200 fixed bottom-0 w-full z-30 max-w-3xl left-1/2 transform -translate-x-1/2">
        <ul class="flex justify-between text-xs font-medium text-gray-400">
            <li class="flex-1 text-center py-3 active-tab text-slate-800" onclick="switchTab('dashboard', this)">
                <i class="fas fa-calendar-alt text-lg block mb-1"></i>대시보드
            </li>
            <li class="flex-1 text-center py-3" onclick="switchTab('breakdown', this)">
                <i class="fas fa-wrench text-lg block mb-1"></i>고장접수
            </li>
            <li class="flex-1 text-center py-3" onclick="switchTab('maintenance', this)">
                <i class="fas fa-clipboard-list text-lg block mb-1"></i>정비수행
            </li>
            <li class="flex-1 text-center py-3" onclick="switchTab('settings', this)">
                <i class="fas fa-cog text-lg block mb-1"></i>설정
            </li>
        </ul>
    </nav>

    <div id="modal-report" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded p-4 shadow-xl">
            <div class="flex justify-between items-center mb-3">
                <h3 class="font-bold text-lg text-slate-800">보고서 복사</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-black"><i class="fas fa-times text-xl"></i></button>
            </div>
            <textarea id="report-output" class="w-full h-64 border rounded p-3 text-sm bg-gray-50 focus:outline-none resize-none whitespace-pre-wrap leading-relaxed" readonly></textarea>
            <button onclick="copyToClipboard()" class="w-full mt-3 bg-slate-800 text-white py-3 rounded font-bold">텍스트 복사</button>
        </div>
    </div>

    <script>
        const state = {
            vehicles: JSON.parse(localStorage.getItem('fm_veh') || '[]'),
            checklist: JSON.parse(localStorage.getItem('fm_chk') || '[]'),
            plans: JSON.parse(localStorage.getItem('fm_plan') || '[]'),
            breakdowns: JSON.parse(localStorage.getItem('fm_brk') || '[]'),
            history: JSON.parse(localStorage.getItem('fm_hist') || '[]'),
            scheduleMap: {},
            currentDate: new Date()
        };

        const subCatDB = {
            "엔진": ["윤활계통", "냉각계통", "연료계통", "흡배기계통", "구동벨트", "기타"],
            "조향": ["타이로드엔드", "스티어링기어", "파워펌프/오일", "기타"],
            "제동": ["브레이크패드", "디스크/드럼", "브레이크오일", "캘리퍼", "기타"],
            "구동": ["쇽업소버", "스프링/암", "미션오일", "등속조인트", "타이어", "기타"],
            "전장": ["배터리", "알터네이터", "전조등/제동등", "에어컨/히터", "기타"],
            "특장": ["유압라인", "펌프", "와이어/실린더", "기타"]
        };

        const holidays = ['2026-01-01', '2026-03-01', '2026-05-05', '2026-06-06', '2026-08-15', '2026-10-03', '2026-10-09', '2026-12-25'];

        function isWorkingDay(dObj) {
            const day = dObj.getDay();
            if(day === 0 || day === 6) return false;
            if(holidays.includes(dObj.toISOString().split('T')[0])) return false;
            return true;
        }

        function getNextWorkingDay(dObj) {
            let d = new Date(dObj);
            while(!isWorkingDay(d)) d.setDate(d.getDate() + 1);
            return d.toISOString().split('T')[0];
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.bottom-nav li').forEach(l => {
                l.classList.remove('text-slate-800'); l.classList.add('text-gray-400');
            });
            document.getElementById(`tab-${tabId}`).classList.add('active');
            el.classList.remove('text-gray-400'); el.classList.add('text-slate-800');
            if(tabId === 'dashboard') { calculateSchedule(); renderCalendar(); }
        }

        function excelDateToJS(serial) {
            if(!serial) return "";
            if(typeof serial === 'string') return serial.replace(/\//g, '-');
            return new Date((serial - 25569) * 86400 * 1000).toISOString().split('T')[0];
        }

        function autoMapGroup(name) {
            if(/(1톤|2\.5톤|5톤|마이티|봉고)/.test(name)) return "상용트럭";
            if(/(K-?311|1 1\/4톤)/.test(name)) return "K311 계열";
            if(/(K-?711)/.test(name)) return "K711 계열";
            if(/(덤프|트랙터|8\.5~25톤|대형)/.test(name)) return "대형트럭(덤프/트랙터)";
            if(/(유조|급수차)/.test(name)) return "유조차(특장)";
            if(/(스타렉스|12인승|AMB|중형버스)/.test(name)) return "승합차";
            if(/(코란도|렉스턴|짚)/.test(name)) return "소형/승용차";
            if(/(리프트|세척기|수거기)/.test(name)) return "특수장비";
            return "기본차량";
        }

        document.getElementById('excel-upload').addEventListener('change', e => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = evt => {
                const workbook = XLSX.read(new Uint8Array(evt.target.result), {type: 'array'});
                try {
                    const bl = ['188-1', '190-1', '191-1', '197'];
                    state.vehicles = XLSX.utils.sheet_to_json(workbook.Sheets['차량대장']).filter(v => {
                        const idStr = String(v.호수);
                        if(bl.includes(idStr) || /(188-1|190-1|191-1|197)/.test(idStr)) return false;
                        if(v.품명 && /(30kw|발전기)/.test(v.품명)) return false;
                        return true;
                    }).map(v => ({ id: String(v.호수), name: v.품명, group: v.점검그룹 || autoMapGroup(v.품명) }));

                    state.checklist = XLSX.utils.sheet_to_json(workbook.Sheets['체크리스트 DB']).map(c => 
                        ({ group: c.점검그룹, cycle: c.점검주기, item: c.항목, method: c.정비방법 })
                    );

                    state.plans = XLSX.utils.sheet_to_json(workbook.Sheets['예방정비계획']).map(p => ({
                        id: String(p.호수), 
                        date: excelDateToJS(p.계획일자), 
                        cycle: String(p.점검주기).replace('반년', '반기'),
                        uid: Math.random().toString(36).substr(2, 9)
                    }));
                    saveData(); init(); alert('연동 성공');
                } catch(err) { alert('오류가 발생했습니다.'); }
            };
            reader.readAsArrayBuffer(file);
        });

        function calculateSchedule() {
            state.scheduleMap = {};
            const y = state.currentDate.getFullYear(), m = state.currentDate.getMonth(), todayStr = new Date().toISOString().split('T')[0];
            let dateMap = {};

            for(let d=1; d<=31; d++) {
                let tmp = new Date(y, m, d);
                if(tmp.getMonth() !== m) break;
                if(isWorkingDay(tmp)) dateMap[tmp.toISOString().split('T')[0]] = { breakdown: [], plan: [] };
            }

            state.breakdowns.forEach(b => {
                let target = getNextWorkingDay(b.date < todayStr ? todayStr : b.date);
                if(!dateMap[target]) dateMap[target] = { breakdown: [], plan: [] };
                dateMap[target].breakdown.push(b);
            });

            state.plans.forEach(p => {
                if(state.history.includes(p.uid)) return;
                if(!p.date.startsWith(`${y}-${String(m+1).padStart(2,'0')}`)) return;
                
                let attempt = new Date(p.date), pulled = false;
                if(!isWorkingDay(attempt)) {
                    for(let i=1; i<=7; i++) {
                        attempt.setDate(attempt.getDate() - 1);
                        if(isWorkingDay(attempt)) { pulled = true; break; }
                    }
                }
                let aStr = attempt.toISOString().split('T')[0];

                if(!dateMap[aStr] || dateMap[aStr].breakdown.length > 0) {
                    let found = false, cursor = new Date(aStr);
                    cursor.setDate(cursor.getDate() + 1);
                    while(cursor.toISOString().split('T')[0] <= p.date) {
                        let cStr = cursor.toISOString().split('T')[0];
                        if(isWorkingDay(cursor) && dateMap[cStr] && dateMap[cStr].breakdown.length === 0 && dateMap[cStr].plan.length === 0) {
                            dateMap[cStr].plan.push(p); found = true; break;
                        }
                        cursor.setDate(cursor.getDate() + 1);
                    }
                    if(!found && dateMap[p.date] && isWorkingDay(new Date(p.date))) dateMap[p.date].plan.push(p);
                    else if(!found && dateMap[aStr]) dateMap[aStr].plan.push(p);
                } else dateMap[aStr].plan.push(p);
            });

            if(state.vehicles.length > 0) {
                Object.keys(dateMap).forEach(dStr => {
                    if(dateMap[dStr].breakdown.length === 0 && dateMap[dStr].plan.length === 0) {
                        let seed = parseInt(dStr.replace(/-/g, ''));
                        dateMap[dStr].plan.push({ id: state.vehicles[seed % state.vehicles.length].id, cycle: '일일점검', type: 'auto' });
                    }
                });
            }
            state.scheduleMap = dateMap;
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            const y = state.currentDate.getFullYear(), m = state.currentDate.getMonth();
            document.getElementById('current-month-display').innerText = `${y}년 ${m + 1}월`;

            const firstDay = new Date(y, m, 1).getDay();
            const daysInMonth = new Date(y, m + 1, 0).getDate();
            let startOffset = (firstDay >= 1 && firstDay <= 5) ? firstDay - 1 : 0;

            for(let i=0; i<startOffset; i++) grid.innerHTML += `<div class="bg-white min-h-day p-1 border-r border-b border-gray-200 opacity-30"></div>`;

            for(let d=1; d<=daysInMonth; d++) {
                let dObj = new Date(y, m, d), dow = dObj.getDay();
                if(dow === 0 || dow === 6) continue;

                let dStr = dObj.toISOString().split('T')[0], sData = state.scheduleMap[dStr];
                let html = `<div class="bg-white min-h-day p-1 flex flex-col gap-1 border-r border-b border-gray-200">
                    <div class="text-[10px] text-right font-bold text-gray-400">${d}</div>`;
                
                if(sData) {
                    sData.breakdown.forEach(b => html += `<div class="bg-red-600 text-white text-[10px] px-1 py-0.5 rounded truncate">고장: [${b.id}]</div>`);
                    sData.plan.forEach(p => {
                        let v = state.vehicles.find(x=>x.id===p.id)||{name:''};
                        if(p.cycle === '반기') html += `<div class="bg-blue-600 text-white text-[10px] px-1 py-0.5 rounded truncate">[${p.id}] ${v.name}</div>`;
                        else if(p.cycle === '월간') html += `<div class="bg-yellow-500 text-black font-bold text-[10px] px-1 py-0.5 rounded truncate">[${p.id}] ${v.name}</div>`;
                        else html += `<div class="bg-green-500 text-white text-[10px] px-1 py-0.5 rounded truncate">일일: [${p.id}]</div>`;
                    });
                }
                grid.innerHTML += html + `</div>`;
            }
        }

        function changeMonth(dir) { state.currentDate.setMonth(state.currentDate.getMonth() + dir); calculateSchedule(); renderCalendar(); }

        function updateSubCat() {
            const main = document.getElementById('bd-main-cat').value, sub = document.getElementById('bd-sub-cat');
            sub.innerHTML = '<option value="">선택</option>';
            document.getElementById('wrap-bd-custom').classList.add('hidden');
            if(main && subCatDB[main]) { sub.disabled = false; subCatDB[main].forEach(c => sub.innerHTML += `<option value="${c}">${c}</option>`); }
            else sub.disabled = true;
        }

        function toggleCustomSub() {
            const isCustom = document.getElementById('bd-sub-cat').value === '기타';
            document.getElementById('wrap-bd-custom').classList[isCustom ? 'remove' : 'add']('hidden');
            document.getElementById('bd-custom').required = isCustom;
        }

        document.getElementById('form-breakdown').addEventListener('submit', e => {
            e.preventDefault();
            let sub = document.getElementById('bd-sub-cat').value;
            if(sub === '기타') sub = document.getElementById('bd-custom').value;
            state.breakdowns.push({
                id: document.getElementById('bd-vehicle').value,
                date: new Date().toISOString().split('T')[0], cycle: '고장정비',
                main: document.getElementById('bd-main-cat').value, sub, desc: document.getElementById('bd-desc').value
            });
            saveData(); e.target.reset(); updateSubCat(); switchTab('dashboard', document.querySelector('.bottom-nav li:first-child'));
        });

        function renderChecklist() {
            const id = document.getElementById('mt-vehicle').value, cycle = document.getElementById('mt-cycle').value, area = document.getElementById('checklist-area');
            if(!id || !cycle) { area.innerHTML = '<p class="text-center text-sm text-gray-400 mt-4">차량 및 주기를 선택하세요.</p>'; return; }
            const veh = state.vehicles.find(v => v.id === id);
            const items = state.checklist.filter(c => c.group === veh.group && c.cycle === cycle);
            if(!items.length) { area.innerHTML = `<p class="text-sm text-red-500 mt-4 text-center">조회된 정비 항목이 없습니다.</p>`; return; }
            
            let html = `<div class="text-xs font-bold text-gray-500 mb-2">총 ${items.length}개 항목</div>`;
            items.forEach((item, idx) => {
                html += `<div class="border rounded mb-2 overflow-hidden">
                    <button class="w-full bg-slate-50 text-left p-3 text-sm font-semibold flex justify-between" onclick="this.nextElementSibling.classList.toggle('hidden')">
                        <span>${idx+1}. ${item.item}</span><i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="hidden p-3 text-xs bg-white border-t border-gray-100">${item.method.replace(/\n/g, '<br>')}</div>
                </div>`;
            });
            const matchingPlan = state.plans.find(p => p.id === id && !state.history.includes(p.uid) && (p.cycle === cycle || (cycle === '일일점검' && p.cycle === '월간')));
            html += `<button onclick="completeMaintenance('${matchingPlan ? matchingPlan.uid : ''}')" class="w-full mt-4 bg-slate-800 text-white font-bold py-3 rounded">정비 완료 저장</button>`;
            area.innerHTML = html;
        }

        function completeMaintenance(uid) {
            if(uid) state.history.push(uid);
            saveData(); alert('완료 처리되었습니다.');
            document.getElementById('mt-vehicle').value = ''; document.getElementById('mt-cycle').value = '';
            renderChecklist(); calculateSchedule(); renderCalendar();
        }

        function cleanItem(str) { return str.replace(/(점검|확인|검사|상태|수준|유격|장력|여부|류|량|오염|균열|소음)$/g, '').trim(); }
        function seedShuffle(arr, seedStr) {
            let res = [...arr], seed = [...seedStr].reduce((a,c)=>a+c.charCodeAt(0), 0);
            for(let i=res.length-1; i>0; i--) { let r = Math.floor((Math.sin(seed++) * 10000 - Math.floor(Math.sin(seed-1)*10000)) * (i+1)); [res[i], res[r]] = [res[r], res[i]]; }
            return res;
        }

        let offsetMap = {};
        function openReportModal(type) {
            const today = new Date(), dates = [];
            if(type === 'today') {
                dates.push(today.toISOString().split('T')[0]);
                let tmrw = new Date(today); tmrw.setDate(tmrw.getDate()+1);
                dates.push(tmrw.toISOString().split('T')[0]);
            } else {
                const y = state.currentDate.getFullYear(), m = state.currentDate.getMonth(), days = new Date(y, m+1, 0).getDate();
                for(let d=1; d<=days; d++) {
                    let tmp = new Date(y, m, d);
                    if(tmp.getDay()!==0 && tmp.getDay()!==6) dates.push(`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
                }
            }

            let report = []; offsetMap = {};
            dates.forEach(dStr => {
                if(!state.scheduleMap[dStr]) return;
                const sData = state.scheduleMap[dStr];
                
                sData.breakdown.forEach(b => {
                    const veh = state.vehicles.find(v => v.id === b.id) || {name:''};
                    report.push(`[${b.id}] ${veh.name} (고장수리) - ${dStr} 예정\n  └ ${b.main}(${b.sub}) 점검 및 수리 (${b.desc})\n`);
                });

                sData.plan.forEach(p => {
                    const veh = state.vehicles.find(v => v.id === p.id); if(!veh) return;
                    let typeName = p.type === 'auto' ? '일일 예방정비' : (p.cycle === '반기' ? '반기 예방정비' : '월간 예방정비');
                    let dbCycle = p.cycle === '반기' ? '정기점검' : '일일점검';
                    let items = state.checklist.filter(c => c.group === veh.group && c.cycle === dbCycle).map(c => cleanItem(c.item));
                    if(!items.length) items = ['엔진오일','타이어','브레이크','배터리','등화장치','조향장치'];
                    
                    items = seedShuffle(items, dStr);
                    if(offsetMap[veh.group] === undefined) offsetMap[veh.group] = 0;
                    let off = offsetMap[veh.group], sel = [];
                    for(let i=0; i<6; i++) sel.push(items[(off+i)%items.length]);
                    offsetMap[veh.group] = (off + 3) % items.length;

                    report.push(`[${p.id}] ${veh.name} (${typeName}) - ${dStr} 예정\n  └ ${sel.slice(0,3).join(', ')} 등 점검\n  └ ${sel.slice(3,6).join(', ')} 등 점검\n`);
                });
            });
            document.getElementById('report-output').value = report.length ? report.join('\n') : '일정이 없습니다.';
            document.getElementById('modal-report').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal-report').classList.add('hidden'); }
        function copyToClipboard() { document.getElementById('report-output').select(); document.execCommand('copy'); alert('복사되었습니다.'); closeModal(); }

        function updateStats() { document.getElementById('stat-veh').innerText = state.vehicles.length+'대'; document.getElementById('stat-plan').innerText = (state.plans.length - state.history.length)+'건'; }
        function populateSelects() {
            let opts = '<option value="">선택</option>';
            state.vehicles.forEach(v => opts += `<option value="${v.id}">[${v.id}] ${v.name}</option>`);
            document.getElementById('bd-vehicle').innerHTML = opts; document.getElementById('mt-vehicle').innerHTML = opts;
        }
        function saveData() {
            localStorage.setItem('fm_veh', JSON.stringify(state.vehicles)); localStorage.setItem('fm_chk', JSON.stringify(state.checklist));
            localStorage.setItem('fm_plan', JSON.stringify(state.plans)); localStorage.setItem('fm_brk', JSON.stringify(state.breakdowns));
            localStorage.setItem('fm_hist', JSON.stringify(state.history));
            updateStats(); populateSelects();
        }
        function resetSystem() { if(confirm('모든 데이터를 삭제하시겠습니까?')) { localStorage.clear(); location.reload(); } }
        function init() { updateStats(); populateSelects(); calculateSchedule(); renderCalendar(); }
        
        window.onload = init;
    </script>
</body>
</html>
